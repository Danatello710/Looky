name: Build Looky APK

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev \
            libssl-dev libsqlite3-dev lld python3-pip python3-setuptools

      - name: Install Buildozer and Cython
        run: |
          # Устанавливаем Cython версии 0.29.33 — это золотой стандарт для Kivy
          pip3 install --user --upgrade "Cython<3.0" virtualenv buildozer
          # Добавляем путь к buildozer в систему
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # Соглашаемся со всеми лицензиями Android SDK автоматически
          yes | buildozer android debug
        env:
          CI: true

      - name: Upload APK
        # Этот шаг сработает, даже если сборка упала (чтобы ты мог скачать логи)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Looky-Package
          path: bin/*.apk
